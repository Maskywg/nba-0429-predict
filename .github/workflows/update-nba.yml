name: 🏀 自動更新 NBA 賽果與傷兵

on:
  schedule:
    # 比賽時段（台灣 00:30–11:30 ≈ UTC 16:30–03:30）每 15 分鐘
    - cron: '*/15 17-23 * * *'
    - cron: '*/15 0-3 * * *'
    # 非比賽時段（台灣 12:00–00:30 ≈ UTC 04:00–16:00）每 2 小時
    - cron: '0 4-16/2 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安裝套件
        run: pip install requests

      - name: 抓取 ESPN 賽果並更新 Firestore
        run: python3 scripts/update_results.py

      - name: 抓取 ESPN 傷兵報告並更新網頁
        run: python3 scripts/update_injuries.py

      - name: 提交傷兵更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "🤖 自動更新：傷兵報告"
          git push
